<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daisenko | ประวัติการจองของฉัน</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --primary: #0b1f44;
            --accent: #2563eb;
            --bg: #f4f6fb;
            --card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius: 18px;
            --shadow: 0 20px 50px rgba(15, 23, 42, .06);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 24px;
        }

        /* ===== NAV ===== */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav {
            height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 42px;
        }

        /* ===== AVATAR ===== */
        .profile {
            position: relative;
        }

        .avatar-btn {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }

        .avatar-letter {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px #e5e7eb;
        }

        .avatar-btn:hover .avatar-letter {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .avatar-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ef4444;
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffffff;
        }

        /* ===== PROFILE MENU ===== */
        .profile-menu {
            position: absolute;
            right: 0;
            top: 54px;
            background: #ffffff;
            width: 220px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: none;
            overflow: hidden;
        }

        .profile-info {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .profile-info strong {
            display: block;
            font-size: 14px;
        }

        .profile-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .profile-menu a {
            display: block;
            padding: 12px 16px;
            font-size: 14px;
        }

        .profile-menu a:hover {
            background: #f1f5f9;
        }

        .logout {
            color: #dc2626;
        }

        /* ===== NAV RIGHT ===== */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ICON BUTTON */
        .icon-btn {
            flex: 0 0 40px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            position: relative;
            transition: background .2s ease, box-shadow .2s ease;
        }

        .icon-btn:hover {
            background: #f9fafb;
        }

        /* SEARCH */
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #searchInput {
            flex: 0 0 auto;
            width: 0;
            opacity: 0;
            padding: 8px 0;
            border-radius: 999px;
            border: 1.5px solid #e5e7eb;
            font-size: 14px;
            outline: none;
            background: #fff;
            transition: width .3s ease, opacity .2s ease, padding .3s ease;
        }

        #searchInput.show {
            width: 200px;
            opacity: 1;
            padding: 8px 14px;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* NOTIFICATION */
        .notification-wrapper {
            position: relative;
        }

        .notify-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            padding: 0 2px;
            border-radius: 900px;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid #fff;
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.6);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .notification-dropdown {
            position: absolute;
            top: 52px;
            right: 0;
            width: 320px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .18);
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .notification-dropdown::before {
            content: "Notifications";
            display: block;
            padding: 14px 16px;
            font-weight: 700;
            font-size: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .notification-dropdown.show {
            display: block;
        }

        .notification-dropdown ul {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
        }

        .notification-dropdown li {
            padding: 14px 16px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            transition: background .2s;
        }

        .notification-dropdown li:hover {
            background: #f9fafb;
        }

        .notification-dropdown li.unread {
            font-weight: 600;
            background: #eef2ff;
        }

        .notification-dropdown li.empty {
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #9ca3af;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            padding: 56px 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        /* ===== FILTER ===== */
        .filters {
            background: #ffffff;
            padding: 6px;
            border-radius: 999px;
            display: inline-flex;
            gap: 6px;
            box-shadow: inset 0 0 0 1px #e5e7eb;
        }

        .filter {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .filter.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* ===== TABLE ===== */
        .table-wrapper {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        thead {
            background: #e7e9ec;
        }

        th,
        td {
            padding: 16px 18px;
            font-size: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
            white-space: nowrap;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        td:first-child {
            color: var(--accent);
            font-weight: 500;
        }

        th,
        td {
            padding: 18px 22px;
            font-size: 14px;
            border-bottom: 1px solid #e5e7eb;
            text-align: center;
            line-height: 1.6;
            vertical-align: top;
        }

        td:nth-child(2) {
            min-width: 180px;
        }

        td:nth-child(3) {
            min-width: 160px;
        }

        td:nth-child(4) {
            white-space: nowrap;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
        }


        td:nth-child(7) {
            min-width: 240px;
        }

        /* ===== STATUS ===== */
        .status {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 500;
            display: inline-block;
        }

        .completed {
            background: #ecfdf5;
            color: #047857;
        }

        .pending {
            background: #fff7ed;
            color: #c2410c;
        }

        .cancelled {
            background: #fef2f2;
            color: #b91c1c;
        }

        .action a {
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 8px;
            color: var(--accent);
        }

        .action a:hover {
            background: #f1f5f9;
        }

        .assigned {
            background: #e8f7ef;
            color: #2e7d32;
        }

        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, .6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-card {
            background: #ffffff;
            padding: 32px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
        }

        .modal-card h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .modal-card p {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-outline {
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #ffffff;
            cursor: pointer;
        }

        .btn-primary {
            padding: 10px 22px;
            font-size: small;
            border-radius: 10px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            cursor: pointer;
        }

        footer {
            background: #004aad;
            color: #ffffff;
            text-align: center;
            padding: 26px;
            font-size: 13px;
        }

        /* ===== MOBILE MODE ======= */
        @media (max-width: 768px) {
            .container {
                padding: 0 18px;
            }

            .nav {
                height: 64px;
            }

            .logo img {
                height: 34px;
            }

            .nav-right {
                gap: 10px;
            }

            h1 {
                font-size: 22px;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .filters {
                width: auto;
                justify-content: flex-start;
                overflow-x: auto;
                gap: 6px;
            }

            /* ===== TABLE → CARD ===== */

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
                width: 100%;
            }

            thead {
                display: none;
            }

            tbody tr {
                background: #fff;
                margin-bottom: 16px;
                border-radius: 16px;
                padding: 16px;
                box-shadow: 0 8px 24px rgba(0, 0, 0, .05);
            }

            tbody td {
                border: none;
                text-align: left;
                padding: 6px 0;
                font-size: 14px;
            }

            tbody td::before {
                content: attr(data-label);
                font-weight: 700;
                font-size: 12px;
                color: #475569;
                margin-bottom: 4px;
            }

            .status {
                margin-top: 4px;
            }

            .notification-dropdown {
                width: 280px;
                right: -20px;
            }
        }

        /* ======== MOBILE CARD VERSION ============ */

        .mobile-booking-list {
            display: none;
        }

        .booking-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.06);
            transition: transform .2s ease;
        }

        .booking-card:hover {
            transform: translateY(-2px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-id {
            font-weight: 600;
            color: var(--accent);
            font-size: 15px;
        }

        .card-service {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .card-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .card-bottom {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-note {
            font-size: 13px;
            max-width: 65%;
        }

        .card-action a {
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 999px;
            background: #eef2ff;
            color: var(--accent);
        }

        /* ===== MOBILE SWITCH ===== */
        @media (max-width: 768px) {

            .table-wrapper {
                display: none;
            }

            .mobile-booking-list {
                display: block;
            }

        }
    </style>
</head>

<body>

    <!-- NAV -->
    <header>
        <div class="container nav">
            <div class="logo">
                <a href="home.html">
                    <img src="/images/logo.png" alt="Daisenko Logo">
                </a>
            </div>

            <div class="nav-right">
                <div class="search-wrapper">
                    <input id="searchInput" type="text" placeholder="ค้นหา" oninput="searchHome()" />

                    <button class="icon-btn" onclick="toggleSearch()">
                        <i class="ri-search-line"></i>
                    </button>
                </div>

                <div class="notification-wrapper">
                    <button class="icon-btn" onclick="toggleNotification()">
                        <i class="ri-notification-3-line"></i>
                        <span id="notifyCount" class="notify-badge">0</span>
                    </button>
                    <div id="notificationDropdown" class="notification-dropdown">
                        <ul id="notificationList"></ul>
                    </div>
                </div>
                <div id="navAuth"></div>
            </div>
        </div>
    </header>

    <!-- MAIN -->
    <main>
        <div class="container">
            <div class="page-header">
                <h1>ประวัติการจองของฉัน</h1>

                <div class="filters">
                    <button class="filter active" onclick="filterBooking('all', this)">All</button>
                    <button class="filter" onclick="filterBooking('pending', this)">Pending</button>
                    <button class="filter" onclick="filterBooking('assigned', this)">Completed</button>
                    <button class="filter" onclick="filterBooking('rejected', this)">Rejected</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>รหัสการจอง</th>
                            <th>บริการ</th>
                            <th>วัน / เวลา</th>
                            <th>สถานที่</th>
                            <th>สถานะ</th>
                            <th>การดำเนินการ</th>
                            <th>หมายเหตุจากระบบ</th>
                        </tr>
                    </thead>

                    <tbody id="bookingTable"></tbody>
                </table>
            </div>
            <!-- MOBILE CARD VIEW -->
            <div class="mobile-booking-list" id="mobileBookingList"></div>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal" id="bookingModal">
        <div class="modal-card" id="modalContent">
        </div>
    </div>


    <footer>
        © 2026 Daisenko (Thailand) Co., Ltd. All Rights Reserved.
    </footer>

    <script>
        const navAuth = document.getElementById("navAuth");
        const isLoggedIn = localStorage.getItem("isLoggedIn");
        const user = JSON.parse(localStorage.getItem("user") || "{}");

        if (isLoggedIn) {
            navAuth.innerHTML = `
                <div class="profile">
                <button class="avatar-btn" onclick="toggleProfile()">
                    <div class="avatar-letter">
                    ${user.name?.charAt(0) || "U"}
                    </div>
                </button>

                <div class="profile-menu" id="profileMenu">
                    <div class="profile-info">
                    <strong>${user.name || "-"}</strong>
                    <span>${user.email || "-"}</span>
                    </div>
                    <a href="home.html">หน้าหลัก</a>
                    <a href="myprofile.html">บัญชีของฉัน</a>
                    <a href="servicelist.html">ประเภทการบริการ</a>
                    <a href="booking.html">จองบริการ</a>
                    <a href="history.html">ประวัติการจอง</a>
                    <a href="#" class="logout" onclick="logout()">ออกจากระบบ</a>
                </div>
                </div>
            `;
        } else {
            navAuth.innerHTML = `
                <a href="login.html" class="nav-cta">สมัครสมาชิก / เข้าสู่ระบบ</a>
            `;
        }

        function toggleProfile() {
            const menu = document.getElementById("profileMenu");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            window.location.href = "home.html";
        }

        /* =============   SEARCH =============== */
        function toggleSearch() {
            const input = document.getElementById("searchInput");
            input.classList.toggle("show");

            if (input.classList.contains("show")) {
                input.focus();
            } else {
                input.value = "";
                searchHome();
            }
        }

        function searchHome() {
            const keyword = document
                .getElementById("searchInput")
                .value
                .toLowerCase()
                .trim();

            const rows = document.querySelectorAll("#bookingTable tr");

            rows.forEach(row => {
                const text = row.innerText.toLowerCase();

                if (keyword === "") {
                    row.style.display = "";
                } else if (text.includes(keyword)) {
                    row.style.display = "";
                } else {
                    row.style.display = "none";
                }
            });
        }

        /* =============  NOTIFICATION SYSTEM =============== */

        const notifySound = new Audio("../sounds/notify.mp3");
        notifySound.volume = 1;

        let audioUnlocked = false;
        let previousUnread = 0;

        // ===== UNLOCK AUDIO =====
        function unlockAudio() {
            if (audioUnlocked) return;

            notifySound.play()
                .then(() => {
                    notifySound.pause();
                    notifySound.currentTime = 0;
                    audioUnlocked = true;
                })
                .catch(() => { });
        }
        document.addEventListener("click", unlockAudio, { once: true });

        // ===== LOAD NOTIFICATIONS =====
        function loadNotifications(playSound = false) {

            const notifications =
                JSON.parse(localStorage.getItem("user_notifications") || "[]");

            const unread = notifications.filter(n => !n.read);

            const badge = document.getElementById("notifyCount");
            const list = document.getElementById("notificationList");

            if (!badge || !list) return;

            // BADGE
            badge.textContent = unread.length;
            badge.style.display = unread.length ? "flex" : "none";

            // PLAY SOUND IF NEW
            if (playSound && unread.length > previousUnread && audioUnlocked) {
                notifySound.currentTime = 0;
                notifySound.play().catch(() => { });
            }

            previousUnread = unread.length;

            list.innerHTML = "";

            notifications.forEach((n, i) => {

                const li = document.createElement("li");
                li.textContent = n.message;

                if (!n.read) li.classList.add("unread");

                li.onclick = () => {

                    // MARK AS READ
                    notifications[i].read = true;
                    localStorage.setItem(
                        "user_notifications",
                        JSON.stringify(notifications)
                    );

                    loadNotifications();
                    toggleNotification(true);

                    // ===== SCROLL TO BOOKING IN HISTORY =====
                    if (n.type === "booking" && n.bookingId) {

                        const row =
                            document.getElementById(`booking-${n.bookingId}`);

                        if (row) {
                            row.scrollIntoView({
                                behavior: "smooth",
                                block: "center"
                            });

                            row.style.background = "#eef2ff";
                            row.style.transition = "background .4s";

                            setTimeout(() => {
                                row.style.background = "";
                            }, 2500);
                        }
                    }
                };

                list.appendChild(li);
            });
        }

        // ===== TOGGLE DROPDOWN =====
        function toggleNotification(forceClose = false) {

            const dropdown =
                document.getElementById("notificationDropdown");

            if (!dropdown) return;

            if (forceClose) {
                dropdown.classList.remove("show");
                return;
            }

            dropdown.classList.toggle("show");
        }

        // ===== CLICK OUTSIDE CLOSE =====
        document.addEventListener("click", e => {

            const wrapper =
                document.querySelector(".notification-wrapper");

            const dropdown =
                document.getElementById("notificationDropdown");

            if (!wrapper?.contains(e.target)) {
                dropdown?.classList.remove("show");
            }
        });

        // ===== SYNC REALTIME =====
        window.addEventListener("storage", e => {
            if (e.key === "user_notifications") {
                loadNotifications(true);
            }
        });

        loadNotifications();

        /* ============= BOOKING TABLE =============== */
        const table = document.getElementById("bookingTable");
        const bookings = JSON.parse(localStorage.getItem("bookings") || "[]");
        bookings.sort((a, b) => {
            return new Date(b.bookedTime || 0) - new Date(a.bookedTime || 0);
        });

        bookings.forEach((b, i) => {
            const tr = document.createElement("tr");
            tr.id = `booking-${b.id}`;
            tr.dataset.index = i;
            tr.dataset.status = b.status;
            tr.dataset.cancelType = b.cancelType || "";
            tr.dataset.bookedTime = b.bookedTime;

            tr.innerHTML = `
                <td data-label="รหัสการจอง"> #${b.id} </td>

                <td data-label="บริการ">
                    ล้างแอร์ (${b.service})
                </td>

                <td data-label="วัน / เวลา">
                    ${b.date || "-"}<br>
                    ${new Date(b.bookedTime).toLocaleTimeString()}
                </td>

                <td data-label="สถานที่">
                    ${b.location}
                </td>

                <td data-label="สถานะ">
                    <span class="status ${b.status}">
                        ${b.status === "pending" ? "รอดำเนินการ" :
                    b.status === "assigned" ? "จัดช่างแล้ว" :
                        b.status === "completed" ? "สำเร็จ" :
                            b.status === "cancelled" && b.cancelType === "rejected"
                                ? "ถูกปฏิเสธ"
                                : "ยกเลิกโดยระบบ"}
                    </span>
                </td>

                <td data-label="การดำเนินการ" class="action">
                    <a href="#" onclick="openModal(${i})">ดูรายละเอียด</a>
                </td>

                <td data-label="หมายเหตุจากระบบ" class="note">
                    ${getSystemNote(b)}
                </td>
            `;
            const noteCell = tr.querySelector('.note');

            if (b.status === "cancelled") {
                noteCell.style.color = "#b91c1c";
                noteCell.style.fontWeight = "500";
            }

            if (b.status === "pending") {
                noteCell.style.color = "#c2410c";
            }

            table.appendChild(tr);
        });
        renderMobileCards();

        function filterBooking(status, el) {

            document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            // ===== DESKTOP TABLE =====
            document.querySelectorAll('#bookingTable tr').forEach(row => {

                const rowStatus = row.dataset.status;
                const cancelType = row.dataset.cancelType;

                let show = false;

                if (status === 'all') show = true;

                if (status === 'pending' && rowStatus === 'pending') show = true;

                if (status === 'assigned' && rowStatus === 'assigned') show = true;

                if (
                    status === 'rejected' &&
                    rowStatus === 'cancelled' &&
                    cancelType === 'rejected'
                ) show = true;

                row.style.display = show ? '' : 'none';
            });


            // ===== MOBILE CARD =====
            document.querySelectorAll('.booking-card').forEach(card => {

                const rowStatus = card.dataset.status;
                const cancelType = card.dataset.cancelType;

                let show = false;

                if (status === 'all') show = true;

                if (status === 'pending' && rowStatus === 'pending') show = true;

                if (status === 'assigned' && rowStatus === 'assigned') show = true;

                if (
                    status === 'rejected' &&
                    rowStatus === 'cancelled' &&
                    cancelType === 'rejected'
                ) show = true;

                card.style.display = show ? 'block' : 'none';
            });

        }

        function openModal(index) {
            const b = bookings[index];
            const modal = document.getElementById("bookingModal");
            const content = document.getElementById("modalContent");

            content.innerHTML = `
                <h3>รายละเอียดการจอง</h3>
                <p><strong>รหัส:</strong> #${b.id}</p>
                <p><strong>ชื่อ:</strong> ${b.name}</p>
                <p><strong>โทร:</strong> ${b.phone}</p>
                <p><strong>บริการ:</strong> ล้างแอร์ (${b.service})</p>
                <p><strong>วัน:</strong> ${b.date || "-"}</p>
                <p><strong>สถานที่:</strong> ${b.location}</p>
                <p><strong>หมายเหตุ:</strong> ${b.note || "-"}</p>

                <div class="modal-actions">
                    <button class="btn-outline" onclick="closeModal()">ปิด</button>
                    <button class="btn-primary" onclick="rebook('${b.id}')">จองซ้ำ</button>
                </div>
            `;

            modal.style.display = "flex";
        }

        function closeModal() {
            const modal = document.getElementById("bookingModal");
            modal.style.display = "none";
        }

        function rebook(id) {
            const booking = bookings.find(b => String(b.id) === String(id));

            if (!booking) {
                alert("ไม่พบข้อมูลการจอง");
                return;
            }

            const cleanData = {
                name: booking.name,
                phone: booking.phone,
                amount: booking.service,
                date: booking.date,
                location: booking.location,
            };

            localStorage.setItem("rebookData", JSON.stringify(cleanData));
            window.location.href = "booking.html";
        }

        window.onclick = function (e) {
            if (e.target.classList.contains('modal')) closeModal();
        }

        /* ===== AUTO NOTICE SYSTEM ===== */
        function checkBookingTimeout() {
            const now = new Date();

            document.querySelectorAll('tbody tr').forEach((row, i) => {
                const status = row.dataset.status;
                const bookedTime = row.dataset.bookedTime;
                const noteCell = row.querySelector('.note');
                const statusCell = row.querySelector('td:nth-child(5)');

                if (status === 'pending' && bookedTime) {
                    const bookedDate = new Date(bookedTime);
                    const diffMin = (now - bookedDate) / 1000 / 60;

                    if (diffMin > 15) {
                        bookings[i].status = "cancelled";
                        bookings[i].cancelType = "auto";
                        bookings[i].systemNote = "ไม่มีช่างว่างภายในเวลาที่กำหนด ระบบยกเลิกอัตโนมัติ";
                        bookings[i].cancelType = "auto";

                        localStorage.setItem("bookings", JSON.stringify(bookings));

                        // เปลี่ยน dataset
                        row.dataset.status = "cancelled";

                        // เปลี่ยน UI
                        statusCell.innerHTML = `<span class="status cancelled">ยกเลิก</span>`;
                        noteCell.innerHTML = "ไม่มีช่างว่างภายในเวลาที่กำหนด ระบบยกเลิกอัตโนมัติ";
                        noteCell.style.color = "#b91c1c";
                        noteCell.style.fontWeight = "500";
                    } else {
                        noteCell.innerHTML = "กำลังค้นหาช่างให้คุณ...";
                        noteCell.style.color = "#c2410c";
                    }
                }
            });
        }

        checkBookingTimeout();

        setInterval(checkBookingTimeout, 30000);

        window.addEventListener("load", () => {
            const bookingId = location.hash.replace("#", "");
            if (!bookingId) return;

            setTimeout(() => {
                const row = document.getElementById(`booking-${bookingId}`);
                if (!row) return;

                row.scrollIntoView({
                    behavior: "smooth",
                    block: "center"
                });

                row.style.background = "#eef2ff";
                row.style.transition = "background 0.5s";

                setTimeout(() => row.style.background = "", 3000);
            }, 300);
        });

        window.addEventListener("storage", (event) => {
            if (event.key === "bookings") {
                const updated = JSON.parse(event.newValue || "[]");
                syncBookingUpdates(updated);
            }
        });

        function syncBookingUpdates(updatedBookings) {
            updatedBookings.forEach((b, i) => {
                const row = document.getElementById(`booking-${b.id}`);
                if (!row) return;

                updateBookingRow(row, b);
            });
        }
        function updateBookingRow(row, booking) {
            const statusCell = row.querySelector('td:nth-child(5)');
            const noteCell = row.querySelector('.note');

            // ===== UPDATE DATASET =====
            row.dataset.status = booking.status;
            row.dataset.cancelType = booking.cancelType || "";

            // ===== UPDATE STATUS UI =====
            let statusText = "";
            let statusClass = booking.status;

            if (booking.status === "pending") {
                statusText = "รอดำเนินการ";
            } else if (booking.status === "assigned") {
                statusText = "จัดช่างแล้ว";
            } else if (booking.status === "completed") {
                statusText = "สำเร็จ";
            } else if (booking.status === "cancelled") {
                if (booking.cancelType === "rejected") {
                    statusText = "ถูกปฏิเสธ";
                } else {
                    statusText = "ยกเลิกโดยระบบ";
                }
            }

            statusCell.innerHTML = `
                <span class="status ${statusClass}">
                    ${statusText}
                </span>
            `;

            // ===== UPDATE NOTE =====
            noteCell.textContent = getSystemNote(booking);

            if (booking.status === "cancelled") {
                noteCell.style.color = "#b91c1c";
                noteCell.style.fontWeight = "500";
            } else if (booking.status === "pending") {
                noteCell.style.color = "#c2410c";
            } else {
                noteCell.style.color = "";
                noteCell.style.fontWeight = "";
            }

            // ===== APPLY CURRENT FILTER =====
            applyCurrentFilter(row);
        }

        function applyCurrentFilter(row) {
            const active = document.querySelector('.filter.active');
            if (!active) return;

            const status = active.textContent.toLowerCase();
            const rowStatus = row.dataset.status;
            const cancelType = row.dataset.cancelType;

            let show = false;

            if (status === "all") show = true;
            if (status === "pending" && rowStatus === "pending") show = true;
            if (status === "completed" && rowStatus === "assigned") show = true;
            if (
                status === "rejected" &&
                rowStatus === "cancelled" &&
                cancelType === "rejected"
            ) show = true;

            row.style.display = show ? "" : "none";
        }
        function getSystemNote(booking) {
            if (booking.status === "cancelled" && booking.cancelType === "auto") {
                return booking.systemNote || "ไม่มีช่างว่างภายในเวลาที่กำหนด ระบบยกเลิกอัตโนมัติ";
            }

            if (booking.status === "cancelled" && booking.cancelType === "rejected") {
                return booking.adminNote || "รายการถูกปฏิเสธโดยเจ้าหน้าที่";
            }

            if (booking.status === "pending") {
                return "กำลังค้นหาช่างให้คุณ...";
            }

            if (booking.status === "assigned") {
                return "จัดช่างเรียบร้อยแล้ว";
            }

            if (booking.status === "completed") {
                return "-";
            }

            return "-";
        }

        function renderMobileCards() {

            const container = document.getElementById("mobileBookingList");
            container.innerHTML = "";

            bookings.forEach((b, i) => {

                const card = document.createElement("div");
                card.className = "booking-card";
                card.dataset.status = b.status;
                card.dataset.cancelType = b.cancelType || "";

                let statusText = "";
                if (b.status === "pending") statusText = "รอดำเนินการ";
                else if (b.status === "assigned") statusText = "จัดช่างแล้ว";
                else if (b.status === "completed") statusText = "สำเร็จ";
                else if (b.status === "cancelled" && b.cancelType === "rejected") statusText = "ถูกปฏิเสธ";
                else statusText = "ยกเลิกโดยระบบ";

                card.innerHTML = `
                    <div class="card-top">
                        <div class="card-id">#${b.id}</div>
                        <span class="status ${b.status}">${statusText}</span>
                    </div>

                    <div class="card-service">
                        ล้างแอร์ (${b.service})
                    </div>

                    <div class="card-info">
                        📅 ${b.date || "-"} • ${new Date(b.bookedTime).toLocaleTimeString()}
                    </div>

                    <div class="card-info">
                        📍 ${b.location}
                    </div>

                    <div class="card-bottom">
                        <div class="card-note">
                            ${getSystemNote(b)}
                        </div>

                        <div class="card-action">
                            <a href="#" onclick="openModal(${i})">ดูรายละเอียด</a>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

    </script>

</body>

</html>
