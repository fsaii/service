<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Daisenko</title>

  <!-- ICON -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1F2365;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ===== SIDEBAR LOGO ===== */
    .sidebar-logo {
      margin: 10px 10px;
      padding: 0 0 14px;
      display: flex;
      justify-content: center;
    }

    .sidebar-logo img {
      width: 160px;
      display: block;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 240px;
      background: #fff;
      border-right: 1px solid var(--border);
      padding: 12px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.3s ease;
      z-index: 1001;
    }

    .sidebar.closed {
      transform: translateX(-100%);
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1;
      margin-left: 240px;
      transition: margin-left 0.3s ease;
      min-width: 0;
    }

    .main.full {
      margin-left: 0;
    }

    /* ===== Mobile ===== */
    @media (max-width: 900px) {
      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0 !important;
      }
    }

    /* overlay */
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .35);
      z-index: 1000;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      color: #111;
      transition: 0.2s;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: #b9bcc28d;
    }

    /* ===== TOP NAV BAR ===== */
    .top-nav {
      padding: 18px 28px 6px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: nowrap;
    }

    .top-left-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: nowrap;
    }

    .top-divider {
      height: 2px;
      background: #d6d6d6;
    }

    .top-nav-left {
      flex: 0 0 auto;
    }

    .top-nav-menu {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-logo {
      height: 36px;
    }

    .top-nav-menu a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 1000px;
      font-size: 18px;
      font-weight: 500;
      color: #111;
      text-decoration: none;
      flex: 1;
      justify-content: center;
    }

    .top-nav-menu a.active,
    .top-nav-menu a:hover {
      background: #b9bcc28d;
    }

    /* ===== MAIN ===== */
    .main {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .topbar {
      padding: 14px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: #ef4444;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .content {
      padding: 18px 28px 28px;
    }

    /* ===== ICON STYLE ===== */
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      color: #111;
      position: relative;
    }

    .icon-btn:hover {
      background: #f9fafb;
    }

    /* ===== USER BUTTON ===== */
    .user-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px 6px 6px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      color: #111;
    }

    .user-btn:hover {
      background: #f9fafb;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .user-name {
      font-weight: 500;
    }

    /* ===== USER DROPDOWN ===== */
    .user-wrapper {
      position: relative;
    }

    .user-dropdown {
      position: absolute;
      top: 52px;
      right: 0;
      width: 160px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .15);
      display: none;
      z-index: 1000;
      overflow: hidden;
    }

    .user-dropdown button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: #ef4444;
    }

    .user-dropdown button:hover {
      background: #f9fafb;
    }

    /* ===== NOTIFICATION ===== */
    .notification-wrapper {
      position: relative;
    }

    .notification-icon {
      font-size: 22px;
      cursor: pointer;
    }

    .notify-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      padding: 0 2px;
      border-radius: 900px;
      display: none;
      align-items: center;
      justify-content: center;
      border: 1px solid #fff;
      animation: pop 0.25s ease;
    }

    @keyframes pop {
      from {
        transform: scale(0.6);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .notification-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      width: 320px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .15);
      display: none;
      z-index: 1000;
      overflow: hidden;
    }

    .notification-dropdown::before {
      content: "Notifications";
      display: block;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
    }

    .notification-dropdown ul {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
    }

    .notify-item {
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .2s;
    }

    .notify-item:hover {
      background: #f9fafb;
    }

    .notify-item.unread {
      background: #eef2ff;
    }

    .notify-text {
      font-size: 14px;
      color: #111;
      margin-bottom: 4px;
    }

    .notify-time {
      font-size: 12px;
      color: #6b7280;
    }

    .notification-dropdown li {
      padding: 14px 16px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }

    .notification-dropdown li.empty {
      padding: 24px;
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
    }

    .notification-dropdown li.unread {
      font-weight: 600;
      background: #eef2ff;
    }

    .notification-overlay {
      position: fixed;
      inset: 0;
      z-index: 999;
    }

    /* ===== SEARCH ===== */
    .search-wrapper {
      position: relative;
    }

    #searchInput {
      position: absolute;
      right: 52px;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      opacity: 0;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      font-size: 14px;
      outline: none;
      background: #fff;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    #searchInput.show {
      width: 180px;
      opacity: 1;
    }

    mark {
      background: #fff59d;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .no-results {
      display: none;
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 15px;
      animation: fadeIn 0.3s ease;
    }

    .no-results i {
      font-size: 28px;
      display: block;
      margin-bottom: 10px;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== STATS ===== */
    .overall-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111;
    }

    .stats-modern {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      border-radius: 22px;
      padding: 26px 28px;
      box-shadow: 0 10px 10px rgba(31, 35, 101, .08);
    }

    .stat-card.primary {
      background: #e8f0ff;
      color: #1e3a8a;
    }

    .stat-card:not(.primary):nth-child(2) {
      background: #fff4cc;
      color: #7c5c00;
    }

    .stat-card:not(.primary):nth-child(3) {
      background: #e8ffd9;
      color: #166534;
    }

    .stat-card:not(.primary):nth-child(4) {
      background: #ffd9d9;
      color: #7f1d1d;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .stat-card h2 {
      font-size: 44px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .stat-card span {
      font-size: 15px;
      opacity: .9;
    }

    /* ===== DASHBOARD GRID ===== */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border-radius: 20px;
      padding: 26px;
      min-height: 240px;
      box-shadow: 0 10px 30px rgba(31, 35, 101, .08);
    }

    /* ===== REQUEST TABLE ===== */
    .request-table {
      width: 100%;
      border-collapse: collapse;
    }

    .request-table thead th {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      padding: 12px 12px;
      border-bottom: 2px solid #d1d5db;
      white-space: nowrap;
    }

    .request-table tbody td {
      text-align: center;
      padding: 14px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: #111;
    }

    .request-table tbody tr:hover {
      background: #f9fafb;
    }

    /* ===== STATUS BADGE ===== */
    .status {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .status.pending {
      background: #fff4cc;
      color: #7c5c00;
    }

    .status.assigned {
      background: #e8ffd9;
      color: #166534;
    }

    .status.rejected {
      background: #ffd9d9;
      color: #7f1d1d;
    }

    .address-cell {
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .address-link {
      color: #2563eb;
      text-decoration: none;
      cursor: pointer;
    }

    .address-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ======= MOBILE RESPONSIVE FULL FIX ======== */
    html,
    body {
      width: 100%;
      overflow-x: hidden;
    }

    /* ===== Tablet ===== */
    @media (max-width: 1024px) {
      .top-nav {
        padding: 14px 18px 6px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }

      .user-avatar {
        width: 30px;
        height: 30px;
        font-size: 16px;
      }

      .stats-modern {
        grid-template-columns: repeat(2, 1fr);
      }

      .panel {
        padding: 18px;
      }
    }

    /* ===== Mobile ===== */
    @media (max-width: 768px) {
      .top-nav {
        padding: 12px 14px 6px;
      }

      .top-row {
        gap: 10px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
        font-size: 17px;
      }

      .user-btn {
        padding: 4px 6px;
      }

      .user-avatar {
        width: 25px;
        height: 25px;
        font-size: 15px;
      }

      .top-nav-right {
        gap: 8px;
      }

      .sidebar {
        transform: translateX(-100%);
        position: fixed;
        width: 260px;
      }

      .sidebar.closed {
        transform: translateX(-100%);
      }

      .main {
        margin-left: 0 !important;
        width: 100%;
      }

      .top-nav {
        padding: 14px 16px 6px;
      }

      .content {
        padding: 16px;
      }

      .stats-modern {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .stat-card {
        padding: 18px;
      }

      .stat-card h2 {
        font-size: 28px;
      }

      .card-title {
        font-size: 16px;
      }

      .panel {
        overflow-x: auto;
      }

      .request-table {
        min-width: 700px;
      }

      .request-table thead th {
        font-size: 14px;
        padding: 10px;
      }

      .request-table tbody td {
        font-size: 13px;
        padding: 10px;
      }

      .top-row {
        flex-wrap: nowrap;
        gap: 12px;
      }

      .top-left-group {
        display: flex;
        align-items: center;
        gap: 12px;
        width: auto;
      }

      .top-nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
        width: auto;
      }

      .user-name {
        display: none;
      }

      .user-btn {
        padding: 6px;
      }
    }

    /* ===== Small Mobile (iPhone SE etc.) ===== */
    @media (max-width: 480px) {
      .top-nav {
        padding: 10px 10px 6px;
      }

      .icon-btn {
        width: 30px;
        height: 30px;
        font-size: 16px;
      }

      .user-avatar {
        width: 26px;
        height: 26px;
        font-size: 14px;
      }

      .top-nav-right {
        gap: 6px;
      }

      .top-left-group {
        gap: 8px;
      }

      .overall-title {
        font-size: 22px;
      }

      .stat-card h2 {
        font-size: 26px;
      }

      .icon-btn {
        width: 34px;
        height: 34px;
        font-size: 18px;
      }

      #searchInput {
        width: 120px;
      }
    }
  </style>
</head>

<body data-page="dashboard">

  <div class="layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <!-- LOGO -->
      <div class="sidebar-logo">
        <img src="/images/logo.png" alt="Daisenko Logo">
      </div>
      <div class="sidebar-divider"></div>

      <a href="dashboard.html" data-link="dashboard" class="active">
        <i class="ri-dashboard-line"></i> Dashboard
      </a>

      <a href="request.html" data-link="request">
        <i class="ri-user-line"></i> Request
      </a>

      <a href="technicians.html" data-link="technicians">
        <i class="ri-group-line"></i> Technicians
      </a>

      <a href="service_edit.html" data-link="service_edit">
        <i class="ri-file-list-line"></i> Service Edit
      </a>

    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- ===== TOP NAV ===== -->
      <nav class="top-nav">

        <!-- TOP ROW -->
        <div class="top-row">
          <div class="top-left-group">
            <button class="icon-btn" onclick="toggleSidebar()">
              <i class="ri-menu-line"></i>
            </button>

            <!-- <h1 class="page-title">Dashboard</h1> -->
          </div>

          <div class="top-nav-right">
            <div class="search-wrapper">
              <button class="icon-btn" onclick="toggleSearch()">
                <i class="ri-search-line"></i>
              </button>
              <input id="searchInput" type="text" placeholder="ค้นหา" oninput="searchDashboard()" />
            </div>

            <div class="notification-wrapper">
              <button class="icon-btn" onclick="toggleNotification()">
                <i class="ri-notification-3-line"></i>
                <span id="notifyCount" class="notify-badge">0</span>
              </button>
              <div id="notificationDropdown" class="notification-dropdown">
                <ul id="notificationList"></ul>
              </div>
            </div>

            <div class="user-wrapper">
              <button class="user-btn" onclick="toggleUserMenu()">
                <span class="user-avatar" id="profileAvatar"></span>

                <span class="user-name" id="profileName"></span>
                <i class="ri-arrow-down-s-line"></i>
              </button>

              <div id="userDropdown" class="user-dropdown">
                <button onclick="logout()">
                  <i class="ri-logout-box-r-line"></i>
                  Logout
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- DIVIDER -->
        <div class="top-divider"></div>
      </nav>


      <div class="content">

        <h2 class="overall-title">Overall Status</h2>

        <!-- ===== STATS ===== -->
        <section class="stats-modern">
          <div class="stat-card primary">
            <p class="card-title">
              <span class="dot dot-blue"></span> Total Bookings
            </p>
            <h2 id="totalBooking">0</h2>
            <span>ทั้งหมด</span>
          </div>

          <div class="stat-card">
            <p class="card-title">
              <span class="dot dot-orange"></span> Pending
            </p>
            <h2 id="pendingBooking">0</h2>
            <span>รอดำเนินการ</span>
          </div>

          <div class="stat-card">
            <p class="card-title">
              <span class="dot dot-green"></span> Assigned
            </p>
            <h2 id="assignedBooking">0</h2>
            <span>มอบหมายแล้ว</span>
          </div>

          <div class="stat-card">
            <p class="card-title">
              <span class="dot dot-red"></span> Rejected
            </p>
            <h2 id="rejectedBooking">0</h2>
            <span>ยกเลิก</span>
          </div>
        </section>

        <h2 class="overall-title">Overall Request</h2>

        <!-- ===== PANELS ===== -->
        <section class="dashboard-grid full">
          <div class="panel">
            <table class="request-table">
              <thead>
                <tr>
                  <th>สถานะ</th>
                  <th>ชื่อ</th>
                  <th>เบอร์</th>
                  <th>ที่อยู่</th>
                  <th>วัน / เวลา</th>
                  <th>บริการ</th>
                </tr>
              </thead>
              <tbody id="dashboardRequestTable"></tbody>
            </table>
          </div>
        </section>

      </div>

    </main>
  </div>

  <script>
    /* ===== SIDEBAR TOGGLE ===== */
    function toggleSidebar() {
      const sidebar = document.querySelector(".sidebar");
      const main = document.querySelector(".main");
      const overlay = document.querySelector(".sidebar-overlay");

      const isMobile = window.innerWidth <= 900;

      if (isMobile) {
        sidebar.classList.toggle("open");

        if (sidebar.classList.contains("open")) {
          const ov = document.createElement("div");
          ov.className = "sidebar-overlay";
          ov.onclick = toggleSidebar;
          document.body.appendChild(ov);
        } else {
          if (overlay) overlay.remove();
        }

      } else {
        sidebar.classList.toggle("closed");
        main.classList.toggle("full");
      }
    }
    /* ===== AUTH ===== */
    function loadAdminProfile() {

      const admin = JSON.parse(localStorage.getItem("adminData"));

      if (!admin) {
        window.location.href = "login.html";
        return;
      }

      const nameElement = document.getElementById("profileName");
      const avatarElement = document.getElementById("profileAvatar");

      nameElement.textContent = admin.username;

      const firstLetter = admin.username.charAt(0).toUpperCase();
      avatarElement.textContent = firstLetter;
    }

    if (localStorage.getItem("adminLoggedIn") !== "true") {
      window.location.href = "login.html";
    }

    function logout() {
      localStorage.removeItem("adminLoggedIn");
      localStorage.removeItem("adminData");
      window.location.href = "login.html";
    }

    function toggleUserMenu() {
      const dropdown = document.getElementById("userDropdown");
      const overlay = document.querySelector(".user-overlay");

      if (overlay) {
        dropdown.style.display = "none";
        overlay.remove();
        return;
      }

      dropdown.style.display = "block";

      const ov = document.createElement("div");
      ov.className = "user-overlay";
      ov.style.position = "fixed";
      ov.style.inset = "0";
      ov.style.zIndex = "999";
      ov.onclick = toggleUserMenu;
      document.body.appendChild(ov);
    }

    /* ===== ACTIVE SIDEBAR ===== */
    document.addEventListener("DOMContentLoaded", () => {
      const page = document.body.dataset.page;
      document.querySelectorAll(".sidebar a, .top-nav-menu a").forEach(link => {
        if (link.dataset.link === page) {
          link.classList.add("active");
        }
      });
      loadAdminProfile();
      loadNotifications();
      updateDashboardStats();
      renderDashboardRequests();
    });

    /* ===== NOTIFICATION ===== */
    const notifySound = new Audio("../sounds/notify.mp3");
    notifySound.volume = 1;

    let audioUnlocked = false;

    function unlockAudio() {
      if (audioUnlocked) return;

      notifySound.play()
        .then(() => {
          notifySound.pause();
          notifySound.currentTime = 0;
          audioUnlocked = true;
          console.log("🔓 Audio unlocked");
        })
        .catch(err => console.log("unlock error", err));
    }

    document.addEventListener("click", unlockAudio, { once: true });

    window.addEventListener("storage", (event) => {
      if (event.key === "notifications") {
        const notifications = JSON.parse(event.newValue || "[]");
        const unread = notifications.filter(n => !n.read);

        if (unread.length > 0 && audioUnlocked) {
          notifySound.currentTime = 0;
          notifySound.play().catch(() => { });
        }

        loadNotifications();
      }

      if (event.key === "bookings") {
        updateDashboardStats();
        renderDashboardRequests();
      }
    });

    function loadNotifications() {
      const notifications =
        JSON.parse(localStorage.getItem("notifications")) || [];

      const unread = notifications.filter(n => !n.read);

      const badge = document.getElementById("notifyCount");
      const list = document.getElementById("notificationList");

      badge.textContent = unread.length;
      badge.style.display = unread.length ? "flex" : "none";
      list.innerHTML = "";

      notifications.forEach((n, i) => {
        const li = document.createElement("li");
        li.textContent = n.message;
        li.className = n.read ? "" : "unread";

        li.onclick = () => {
          notifications[i].read = true;
          localStorage.setItem("notifications", JSON.stringify(notifications));

          loadNotifications();

          document.getElementById("notificationDropdown").style.display = "none";
          const ov = document.querySelector(".notification-overlay");
          if (ov) ov.remove();

          if (n.type === "booking" && n.bookingId) {
            window.location.href = `request.html#${n.bookingId}`;
          }
        };

        list.appendChild(li);
      });
    }

    function toggleNotification() {
      const dropdown = document.getElementById("notificationDropdown");
      const overlay = document.querySelector(".notification-overlay");

      if (overlay) {
        dropdown.style.display = "none";
        overlay.remove();
        return;
      }

      dropdown.style.display = "block";
      const ov = document.createElement("div");
      ov.className = "notification-overlay";
      ov.onclick = toggleNotification;
      document.body.appendChild(ov);
    }

    loadNotifications();

    /* ===== SEARCH ===== */
    let currentKeyword = "";

    function toggleSearch() {
      const input = document.getElementById("searchInput");
      input.classList.toggle("show");
      input.focus();
    }

    function searchDashboard() {
      const keyword =
        document.getElementById("searchInput").value.toLowerCase();

      currentKeyword = keyword;

      const bookings =
        JSON.parse(localStorage.getItem("bookings")) || [];

      const filtered = bookings.filter(b =>
        (b.name || "").toLowerCase().includes(keyword) ||
        (b.phone || "").toLowerCase().includes(keyword) ||
        (b.location || "").toLowerCase().includes(keyword) ||
        (b.status || "").toLowerCase().includes(keyword) ||
        (b.serviceType || "").toLowerCase().includes(keyword) ||
        (b.serviceName || "").toLowerCase().includes(keyword)
      );

      renderDashboardRequests(filtered);
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") {
        const input = document.getElementById("searchInput");
        input.classList.remove("show");
        input.value = "";
        currentKeyword = "";
        renderDashboardRequests();
      }
    });

    /* ===== DASHBOARD DATA ===== */
    function updateDashboardStats() {
      const bookings =
        JSON.parse(localStorage.getItem("bookings")) || [];

      document.getElementById("totalBooking").innerText =
        bookings.length;

      document.getElementById("pendingBooking").innerText =
        bookings.filter(b => b.status === "pending").length;

      document.getElementById("assignedBooking").innerText =
        bookings.filter(b => b.status === "assigned").length;

      document.getElementById("rejectedBooking").innerText =
        bookings.filter(b =>
          b.status === "cancelled" && b.cancelType === "rejected"
        ).length;
    }

    function getMapLink(b) {
      // ถ้ามี lat/lng → เปิด Maps App (mobile friendly)
      if (b.lat && b.lng) {
        return `geo:${b.lat},${b.lng}?q=${b.lat},${b.lng}`;
      }

      // fallback → Google Maps Search
      if (b.location) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(b.location)}`;
      }

      return "#";
    }

    function renderDashboardRequests(data) {
      const bookings =
        data || JSON.parse(localStorage.getItem("bookings") || "[]");
      const tbody = document.getElementById("dashboardRequestTable");

      tbody.innerHTML = "";

      // แสดงแค่ 5 รายการล่าสุด (คร่าว ๆ)
      bookings.slice(0, 5).forEach(b => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>
            <span class="status ${b.status}">
              ${b.status.charAt(0).toUpperCase() + b.status.slice(1)}
            </span>
          </td>
          <td>${(b.name)}</td>
          <td>${(b.phone)}</td>
          <td class="address-cell">
            ${b.location
            ? `<a 
                    href="${getMapLink(b)}"
                    ${b.lat && b.lng ? "" : "target='_blank'"}
                    rel="noopener"
                    title="เปิดแผนที่"
                    class="address-link"
                  >
                    <i class="ri-map-pin-2-line"></i>
                    ${(b.location)}
                  </a>`
            : "-"}
          </td>

          <td>
            ${b.date || "-"}<br>
            <small>
              ${b.bookedTime
            ? new Date(b.bookedTime).toLocaleTimeString("th-TH")
            : "-"
          }
            </small>
          </td>

          <td>
            ${(b.serviceType || b.serviceName || "บริการ")} 
            ${b.service ? `(${(b.service)})` : ""}
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString("th-TH") + " " +
        d.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
    }

  </script>

</body>

</html>
