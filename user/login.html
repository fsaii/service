<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Daisenko | เข้าสู่ระบบ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-blue-start: #2563eb;
            --brand-blue-end: #1e40af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f3f6fb, #eef2f7);
        }

        /* ===== CARD ===== */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 20px;
            padding: 42px 38px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* ===== LOGO ===== */
        .logo {
            width: 140px;
            margin-bottom: 22px;
        }

        /* ===== TITLE ===== */
        .auth-title {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 26px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            background: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* ===== PASSWORD ROW ===== */
        .password-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin-bottom: 18px;
        }

        .password-row a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        /* ===== BUTTON ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #ffffff;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 26px 0;
            font-size: 13px;
            color: #9ca3af;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            margin: 0 12px;
        }

        /* ===== SOCIAL ===== */
        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            transition: all 0.2s ease;
        }

        .social-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .social-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        /* ===== FORGOT MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
            z-index: 999;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #fff;
            width: 90%;
            max-width: 380px;
            padding: 32px 28px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.18);
            animation: fadeUp .25s ease;
        }

        .modal-box h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-box p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 20px;
        }

        .modal-box input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f9fafb;
            margin-bottom: 20px;
        }

        .modal-box button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--brand-blue-start), var(--brand-blue-end));
        }

        .close-modal {
            display: block;
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
        }

        /* ===== FOOTER ===== */
        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }

        .auth-footer a {
            color: #004aad;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 34px 26px;
                border-radius: 16px;
            }
        }

        /* ===== RESPONSIVE IMPROVEMENTS ===== */
        .auth-card {
            width: 92%;
            max-width: 420px;
        }

        @media (max-width: 768px) {

            body {
                padding: 20px;
                align-items: flex-start;
            }

            .auth-card {
                margin-top: 40px;
                padding: 32px 24px;
                border-radius: 18px;
            }

            .logo {
                width: 120px;
            }

            .auth-title {
                font-size: 20px;
            }

            .form-group input {
                padding: 15px 16px;
                font-size: 15px;
            }

            .btn-primary {
                padding: 15px;
                font-size: 16px;
            }

            .social-login {
                flex-direction: column;
                /* แตกบรรทัด */
            }

            .social-btn {
                width: 100%;
            }

        }

        @media (max-width: 375px) {

            .auth-card {
                padding: 26px 18px;
            }

            .auth-title {
                font-size: 18px;
            }

            .logo {
                width: 100px;
            }

        }
    </style>
</head>

<body>

    <div class="auth-card">
        <img src="/images/logo.png" alt="Daisenko" class="logo">

        <h2 class="auth-title">เข้าสู่ระบบ</h2>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="email" placeholder="หมายเลขโทรศัพท์ / Email / ชื่อผู้ใช้" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" placeholder="รหัสผ่าน" required>
            </div>

            <div class="password-row">
                <span></span>
                <div class="forgot" onclick="openForgotModal()" style="cursor:pointer; color:#2563eb; font-weight:500;">
                    ลืมรหัสผ่าน?
                </div>
            </div>

            <button type="submit" class="btn-primary">เข้าสู่ระบบ</button>
        </form>

        <div class="divider">
            <span>หรือ</span>
        </div>

        <div class="social-login">
            <button class="social-btn" onclick="socialLogin('facebook')">
                <img src="/images/Facebook.png" alt="Facebook">
                Facebook
            </button>

            <button class="social-btn" onclick="socialLogin('google')">
                <img src="/images/Google.png" alt="Google">
                Google
            </button>
        </div>

        <div class="auth-footer">
            เพิ่งเคยเข้ามาใน Daisenko ใช่หรือไม่? <a href="register.html">สมัครใหม่</a>
        </div>

    </div>

    <!-- FORGOT PASSWORD MODAL -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <h3>รีเซ็ตรหัสผ่าน</h3>
            <p>กรอก Email ของคุณ</p>

            <input type="text" id="resetInput" placeholder="Email">

            <button onclick="sendReset()">ส่งคำขอรีเซ็ต</button>
            <span class="close-modal" onclick="closeForgotModal()">ยกเลิก</span>
        </div>
    </div>

    <script>

        function handleLogin(event) {
            event.preventDefault(); // กันไม่ให้ reload หน้า

            const email = document.getElementById("email").value;

            localStorage.setItem("isLoggedIn", true);

            if (!localStorage.getItem("user")) {
                localStorage.setItem("user", JSON.stringify({
                    name: email.split("@")[0],
                    email: email
                }));
            }

            window.location.href = "home.html";
        }

        function socialLogin(provider) {
            console.log("Login with", provider);

            if (provider === 'facebook') {
                window.location.href =
                    "https://www.facebook.com/login.php?next=" +
                    encodeURIComponent(window.location.origin + "/home.html");
            }

            if (provider === 'google') {
                window.location.href =
                    "https://accounts.google.com/signin/v2/identifier?continue=" +
                    encodeURIComponent(window.location.origin + "/home.html");
            }
        }

        function openForgotModal() {
            const modal = document.getElementById("forgotModal");
            modal.classList.add("active");

            setTimeout(() => {
                document.getElementById("resetInput").focus();
            }, 200);
        }

        function closeForgotModal() {
            document.getElementById("forgotModal").classList.remove("active");
            document.getElementById("resetInput").value = "";
        }

        function sendReset() {
            const value = document.getElementById("resetInput").value.trim();

            if (!value) {
                alert("กรุณากรอก Email");
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(value)) {
                alert("รูปแบบ Email ไม่ถูกต้อง");
                return;
            }

            // Demo reset
            alert("ส่งลิงก์รีเซ็ตรหัสผ่านไปที่ " + value + " แล้ว");

            closeForgotModal();
        }

        document.getElementById("forgotModal").addEventListener("click", function (e) {
            if (e.target === this) {
                closeForgotModal();
            }
        });

    </script>
</body>

</html>
