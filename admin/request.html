<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Requests | Admin</title> <!-- ICON -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/admin/style.css">
  <link rel="stylesheet" href="/css/admin/request.css">
</head>

<body data-page="request">

  <div class="layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <!-- LOGO -->
      <div class="sidebar-logo">
        <img src="/images/logo.png" alt="Daisenko Logo">
      </div>
      <div class="sidebar-divider"></div>

      <a href="dashboard.html" data-link="dashboard">
        <i class="ri-dashboard-line"></i> แดชบอร์ด
      </a>

      <a href="request.html" data-link="request" class="active">
        <i class="ri-user-line"></i> รายการคำขอ
      </a>

      <a href="technicians.html" data-link="technicians">
        <i class="ri-group-line"></i> รายชื่อช่าง
      </a>

      <a href="service_edit.html" data-link="service_edit">
        <i class="ri-file-list-line"></i> แก้ไขบริการ
      </a>

    </aside>

    <!-- MAIN -->
    <main class="main">
      <!-- ===== TOP NAV ===== -->
      <nav class="top-nav">
        <!-- TOP ROW -->
        <div class="top-row">
          <div class="top-left-group">
            <button class="icon-btn" onclick="toggleSidebar()">
              <i class="ri-menu-line"></i>
            </button>

            <!-- <h1 class="page-title">Request</h1> -->
          </div>
          <div class="top-nav-right">
            <div class="search-wrapper">
              <input type="text" id="searchInput" placeholder="ค้นหา" />
              <button class="icon-btn" onclick="openSearch()">
                <i class="ri-search-line"></i>
              </button>
            </div>

            <div class="notification-wrapper">
              <button class="icon-btn" onclick="toggleNotification()">
                <i class="ri-notification-3-line"></i>
                <span id="notifyCount" class="notify-badge">0</span>
              </button>
              <div id="notificationDropdown" class="notification-dropdown">
                <ul id="notificationList"></ul>
              </div>
            </div>

            <div class="user-wrapper">
              <button class="user-btn" onclick="toggleUserMenu()">
                <span class="user-avatar" id="profileAvatar"></span>

                <span class="user-name" id="profileName"></span>
                <i class="ri-arrow-down-s-line"></i>
              </button>

              <div id="userDropdown" class="user-dropdown">
                <button onclick="logout()">
                  <i class="ri-logout-box-r-line"></i>
                  Logout
                </button>
              </div>
            </div>
          </div>
        </div>
        <!-- DIVIDER -->
        <div class="top-divider"></div>
      </nav>

      <div class="content">
        <section class="booking-table-box">
          <div class="filter-header">
            <h3>รายการคำขอ</h3>
            <div class="status-filters"> <button class="filter-btn active" data-status="all">ทั้งหมด</button>
              <button class="filter-btn" data-status="pending">รอดำเนินการ</button> <button class="filter-btn"
                data-status="assigned">มอบหมายแล้ว</button> <button class="filter-btn"
                data-status="rejected">ยกเลิก</button>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <!-- MOBILE CARD CONTAINER -->
            <div id="mobileCardContainer" class="mobile-card-container"></div>
            <table>
              <!-- MOBILE CARD CONTAINER -->
              <div id="mobileCardContainer" class="mobile-card-container"></div>
              <thead>
                <tr>
                  <th>ชื่อ</th>
                  <th>เบอร์</th>
                  <th>ที่อยู่</th>
                  <th>บริการ</th>
                  <th>จำนวน</th>
                  <th>วัน / เวลา</th>
                  <th>ช่าง</th>
                  <th>สถานะ</th>
                  <th>หมายเหตุ</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="bookingTable"></tbody>
            </table>
          </div>
          <div id="noResults" class="no-results"> <i class="ri-search-line"></i>
            <p>No results found</p>
          </div>
        </section>
        <!-- ===== PAGINATION OUTSIDE CARD ===== -->
        <div class="pagination-wrapper outside-pagination">
          <div class="pagination-info" id="paginationInfo"></div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </main>
  </div>
  <!-- MODAL -->
  <div id="rejectModal" class="modal">
    <div class="modal-box">
      <h3>เหตุผลที่ปฏิเสธ</h3> <textarea id="rejectReason"></textarea>
      <div class="modal-actions"> <button onclick="closeModal()">ปิด</button> <button class="btn-reject"
          onclick="confirmReject()">ยกเลิก</button> </div>
    </div>
  </div>
  <div id="assignModal" class="modal">
    <div class="modal-box">
      <h3>เลือกช่าง</h3>
      <div id="techList"></div>
      <div class="modal-actions"> <button onclick="closeAssignModal()">ปิด</button> </div>
    </div>
  </div>

  <!-- SEARCH OVERLAY -->
  <div id="searchOverlay" class="search-overlay">
    <div class="search-panel">
      <div class="search-header">
        <i class="ri-search-line"></i>
        <input type="text" id="searchMobileInput" placeholder="ค้นหา..." oninput="searchDashboardMobile()">
        <button onclick="closeSearchOverlay()">✕</button>
      </div>

      <div class="search-body">
        <p class="search-title">การค้นหายอดนิยม</p>
        <div id="searchResults"></div>
      </div>
    </div>
  </div>

  <script src="/js/admin/request.js"></script>

</body>

</html>
