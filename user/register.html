<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Daisenko | สมัครสมาชิก</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ===== RESET ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
        }

        html,
        body {
            height: 100%;
        }

        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #f3f6fb, #eef2f7);
        }

        /* ===== CARD ===== */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 20px;
            padding: 42px 38px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* ===== LOGO ===== */
        .logo {
            width: 140px;
            margin-bottom: 22px;
        }

        /* ===== TITLE ===== */
        .auth-title {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 26px;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .form-group input:focus {
            outline: none;
            background: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* ===== BUTTON ===== */
        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: #ffffff;
        }


        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            margin: 26px 0;
            font-size: 13px;
            color: #9ca3af;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            margin: 0 12px;
        }

        /* ===== SOCIAL ===== */
        .social-login {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            background: #ffffff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            transition: all 0.2s ease;
        }

        .social-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .social-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }


        /* ===== FOOTER ===== */
        .auth-footer {
            margin-top: 24px;
            font-size: 14px;
            color: #6b7280;
        }

        .auth-footer a {
            color: #004aad;
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .auth-card {
                padding: 34px 26px;
                border-radius: 16px;
            }
        }

        /* ===== TABLET & MOBILE ===== */
        @media (max-width: 768px) {

            body {
                align-items: flex-start;
            }

            .auth-card {
                margin-top: 40px;
                padding: 32px 24px;
                border-radius: 18px;
            }

            .logo {
                width: 120px;
            }

            .auth-title {
                font-size: 20px;
            }

            .form-group input {
                padding: 15px 16px;
                font-size: 15px;
            }

            .btn-primary {
                padding: 15px;
                font-size: 16px;
            }

            .social-login {
                flex-direction: column;
                /* แตกลง */
            }

            .social-btn {
                width: 100%;
            }
        }

        @media (max-width: 375px) {

            .auth-card {
                padding: 26px 18px;
            }

            .auth-title {
                font-size: 18px;
            }

            .logo {
                width: 100px;
            }
        }

        #step-phone,
        #step-otp,
        #step-password {
            animation: fadeUp .25s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <img src="/images/logo.png" alt="Daisenko" class="logo">

        <h2 class="auth-title">สมัครสมาชิก</h2>

        <form id="register-form">
            <!-- STEP 1: PHONE -->
            <div id="step-phone">
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="เบอร์โทรศัพท์" required>
                </div>

                <button type="submit" class="btn-primary">ดำเนินการต่อ</button>

                <div class="divider">
                    <span>หรือ</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="socialLogin('facebook')">
                        <img src="/images/Facebook.png" alt="Facebook">
                        Facebook
                    </button>

                    <button class="social-btn" onclick="socialLogin('google')">
                        <img src="/images/Google.png" alt="Google">
                        Google
                    </button>
                </div>

                <div class="auth-footer">
                    มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
                </div>
            </div>

            <!-- STEP 2: OTP -->
            <div id="step-otp" style="display:none;">
                <div class="form-group">
                    <input type="text" id="otp" placeholder="กรอกรหัส OTP 6 หลัก" required>
                </div>
                <button type="button" class="btn-primary" onclick="verifyOTP()">ยืนยัน OTP</button>
            </div>

            <!-- STEP 3: PASSWORD -->
            <div id="step-password" style="display:none;">
                <div class="form-group">
                    <input type="password" id="password" placeholder="ตั้งรหัสผ่าน" required>
                </div>
                <div class="form-group">
                    <input type="password" id="confirm" placeholder="ยืนยันรหัสผ่าน" required>
                </div>
                <button type="button" class="btn-primary" onclick="finishRegister()">สมัครสมาชิก</button>
            </div>
        </form>
    </div>

    <script>
        let currentPhone = "";
        /* ============= STEP 1: REQUEST OTP ============= */
        document.getElementById("register-form").addEventListener("submit", async e => {
            e.preventDefault();

            const phone = document.getElementById("phone").value.trim();
            if (!phone) return alert("กรุณากรอกเบอร์โทรศัพท์");

            const res = await fetch("http://localhost:3000/request-otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone })
            });

            const data = await res.json();

            if (!data.success) {
                alert(data.message);
                return;
            }

            currentPhone = phone;
            alert("ส่ง OTP แล้ว (เช็คที่ server console)");
            showStep("otp");
        });

        /* =========== STEP 2: VERIFY OTP =========== */
        async function verifyOTP() {
            const otp = document.getElementById("otp").value.trim();

            const res = await fetch("http://localhost:3000/verify-otp", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ phone: currentPhone, otp })
            });

            const data = await res.json();

            if (!data.success) {
                alert("OTP ไม่ถูกต้อง");
                return;
            }

            showStep("password");
        }

        /* ======== STEP 3: CREATE ACCOUNT ========= */
        async function finishRegister() {
            const pass = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;

            if (pass.length < 6) {
                return alert("รหัสผ่านอย่างน้อย 6 ตัว");
            }

            if (pass !== confirm) {
                return alert("รหัสผ่านไม่ตรงกัน");
            }

            const res = await fetch("http://localhost:3000/create-account", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    phone: currentPhone,
                    password: pass
                })
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("user", JSON.stringify(data.user));
                window.location.href = "home.html";
            } else {
                alert(data.message);
            }
        }

        /* ========= STEP SWITCH =========== */
        function showStep(step) {
            document.getElementById("step-phone").style.display = "none";
            document.getElementById("step-otp").style.display = "none";
            document.getElementById("step-password").style.display = "none";

            document.getElementById("step-" + step).style.display = "block";
        }

        function socialLogin(provider) {
            console.log("Login with", provider);

            if (provider === 'facebook') {
                window.location.href =
                    "https://www.facebook.com/login.php?next=" +
                    encodeURIComponent(window.location.origin + "/home.html");
            }

            if (provider === 'google') {
                window.location.href =
                    "https://accounts.google.com/signin/v2/identifier?continue=" +
                    encodeURIComponent(window.location.origin + "/home.html");
            }
        }
    </script>

</body>

</html>
