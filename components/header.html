<header>
  <div class="container nav">
    <div class="logo">
      <a href="home.html">
        <img src="/images/logo.png" alt="Daisenko Logo">
      </a>
    </div>
    <div class="nav-right">
      <div class="search-wrapper">

        <!-- 🔹 Desktop Search -->
        <i class="ri-search-line search-icon"></i>
        <input id="searchInputDesktop" type="text" placeholder="Search" oninput="handleGlobalSearch()" />

        <!-- 🔹 Mobile Button -->
        <button class="icon-btn mobile-search-btn" onclick="toggleSearch()">
          <i class="ri-search-line"></i>
        </button>

      </div>

      <div class="notification-wrapper">
        <button class="icon-btn" onclick="toggleNotification()">
          <i class="ri-notification-3-line"></i>
          <span id="notifyCount" class="notify-badge">0</span>
        </button>
        <div id="notificationDropdown" class="notification-dropdown">
          <ul id="notificationList"></ul>
        </div>
      </div>
      <div id="navAuth"></div>
    </div>
  </div>

</header>

<div id="searchOverlay" class="search-overlay">
  <div class="search-box">
    <i class="ri-search-line"></i>
    <input 
      type="text" 
      id="searchInput" 
      placeholder="ค้นหา..." 
      oninput="handleGlobalSearch()"
    />
    <button class="close-btn" onclick="toggleSearch()">✕</button>
  </div>
</div>
