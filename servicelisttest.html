<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>บริการล้างแอร์ | Daisenko</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --accent: #2563eb;
            --bg: #f4f6fb;
            --card: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 0 24px;
        }

        /* ===== NAV ===== */
        header {
            background: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav {
            height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 42px;
        }

        /* ===== AVATAR ===== */
        .profile {
            position: relative;
        }

        .avatar-btn {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
        }

        .avatar-letter {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 1px #e5e7eb;
        }

        .avatar-btn:hover .avatar-letter {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .avatar-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ef4444;
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            min-width: 18px;
            height: 18px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ffffff;
        }

        /* ===== PROFILE MENU ===== */
        .profile-menu {
            position: absolute;
            right: 0;
            top: 54px;
            background: #ffffff;
            width: 220px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            display: none;
            overflow: hidden;
        }

        .profile-info {
            padding: 14px 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .profile-info strong {
            display: block;
            font-size: 14px;
        }

        .profile-info span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .profile-menu a {
            display: block;
            padding: 12px 16px;
            font-size: 14px;
        }

        .profile-menu a:hover {
            background: #f1f5f9;
        }

        .logout {
            color: #dc2626;
        }

        /* ===== NAV RIGHT ===== */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ICON BUTTON */
        .icon-btn {
            flex: 0 0 40px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            position: relative;
            transition: background .2s ease, box-shadow .2s ease;
        }

        .icon-btn:hover {
            background: #f9fafb;
        }

        /* SEARCH */
        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #searchInput {
            flex: 0 0 auto;
            width: 0;
            opacity: 0;
            padding: 8px 0;
            border-radius: 999px;
            border: 1.5px solid #e5e7eb;
            font-size: 14px;
            outline: none;
            background: #fff;
            transition: width .3s ease, opacity .2s ease, padding .3s ease;
        }

        #searchInput.show {
            width: 200px;
            opacity: 1;
            padding: 8px 14px;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        /* NOTIFICATION */
        .notification-wrapper {
            position: relative;
        }

        .notify-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ef4444;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            padding: 0 2px;
            border-radius: 900px;
            display: none;
            align-items: center;
            justify-content: center;
            border: 1px solid #fff;
            animation: pop 0.25s ease;
        }

        @keyframes pop {
            from {
                transform: scale(0.6);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .notification-dropdown {
            position: absolute;
            top: 52px;
            right: 0;
            width: 320px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .18);
            display: none;
            z-index: 1000;
            overflow: hidden;
        }

        .notification-dropdown::before {
            content: "Notifications";
            display: block;
            padding: 14px 16px;
            font-weight: 700;
            font-size: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .notification-dropdown.show {
            display: block;
        }

        .notification-dropdown ul {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
        }

        .notification-dropdown li {
            padding: 14px 16px;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid #e5e7eb;
            transition: background .2s;
        }

        .notification-dropdown li:hover {
            background: #f9fafb;
        }

        .notification-dropdown li.unread {
            font-weight: 600;
            background: #eef2ff;
        }

        .notification-dropdown li.empty {
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #9ca3af;
        }

        /* ===== MAIN ===== */
        main {
            flex: 1;
            padding: 56px 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 20px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
        }

        /* ===== FILTER ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .filters {
            background: #ffffff;
            padding: 6px;
            border-radius: 999px;
            display: inline-flex;
            gap: 6px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            box-shadow: inset 0 0 0 1px #e5e7eb;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            background: transparent;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .filter.active {
            background: var(--accent);
            color: #ffffff;
        }

        /* ===== SERVICE ===== */
        .service-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .service-item {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0, 0, 0, .08);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .service-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 16px;
            left: 16px;
            padding: 6px 14px;
            font-size: 12px;
            border-radius: 999px;
            font-weight: 600;
            color: #fff;
        }

        /* PROMO */
        .badge.promo {
            background: #dc2626;
        }

        /* STANDARD / PREMIUM */
        .badge.type {
            background: #2563eb;
        }

        .service-info {
            padding: 22px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .price {
            font-size: 20px;
            font-weight: 700;
            color: #0b4ed3;
            margin-bottom: 18px;
        }

        /* ราคาโปรโมชั่น ใช้แดง */
        .price.promo {
            color: #dc2626;
        }

        .service-desc {
            color: #858585;
            font-size: 15px;
            margin-top: 2px;
            margin-bottom: 2px;
        }

        .price-old {
            color: #b4bbc7;
            font-size: 17px;
            text-decoration: line-through;
        }

        .price-new {
            color: #dc2626;
            font-weight: 700;
        }

        .btn-book {
            margin-top: auto;
            padding: 14px;
            text-align: center;
            background: #0b5cff;
            color: #fff;
            border-radius: 12px;
            font-weight: 600;
        }

        /* ===== RESPONSIVE ===== */
        /* TABLET */
        @media (max-width: 1024px) {
            main {
                padding: 40px 0;
            }

            .service-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 22px;
            }

            .service-item img {
                height: 180px;
            }
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .container {
                padding: 0 18px;
            }

            .nav {
                height: 64px;
            }

            .logo img {
                height: 34px;
            }

            .nav-right {
                gap: 10px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .service-grid {
                grid-template-columns: 1fr;
            }

            .service-item img {
                height: 200px;
            }

            h2 {
                font-size: 20px;
            }
        }

        /* SMALL PHONE */
        @media (max-width: 420px) {
            .service-info {
                padding: 18px;
            }

            .price {
                font-size: 18px;
            }

            .btn-book {
                padding: 12px;
                font-size: 14px;
            }
        }

        @media (max-width: 380px) {
            .notification-dropdown {
                width: 280px;
            }
        }

        /* ===== FOOTER ===== */
        footer {
            background: #004aad;
            color: #fff;
            text-align: center;
            padding: 26px;
            font-size: 13px;
            margin-top: auto;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <header>
        <div class="container nav">
            <div class="logo">
                <a href="home.html">
                    <img src="/images/logo.png" alt="Daisenko Logo">
                </a>
            </div>

            <div class="nav-right">
                <div class="search-wrapper">
                    <input id="searchInput" type="text" placeholder="ค้นหา" oninput="searchHome()" />

                    <button class="icon-btn" onclick="toggleSearch()">
                        <i class="ri-search-line"></i>
                    </button>
                </div>

                <div class="notification-wrapper">
                    <button class="icon-btn" onclick="toggleNotification()">
                        <i class="ri-notification-3-line"></i>
                        <span id="notifyCount" class="notify-badge">0</span>
                    </button>
                    <div id="notificationDropdown" class="notification-dropdown">
                        <ul id="notificationList"></ul>
                    </div>
                </div>
                <div id="navAuth"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="service-section">
            <div class="container">
                <div class="section-header">
                    <h2>เลือกบริการของเรา</h2>

                    <div class="filters">
                        <button class="filter active" onclick="filterService('all', this)">ทั้งหมด</button>
                        <button class="filter" onclick="filterService('standard', this)">Standard</button>
                        <button class="filter" onclick="filterService('general', this)">General</button>
                        <button class="filter" onclick="filterService('premium', this)">Premium</button>
                    </div>

                </div>

                <div class="service-grid"></div>

            </div>
        </section>
    </main>

    <footer>
        © 2026 Daisenko (Thailand) Co., Ltd. All Rights Reserved.
    </footer>


    <script src="../js/user/promotion.js"></script>
    <script>
        const API_BASE = "http://localhost:3000/api";
        /* =============   UTIL SAFE JSON ================== */
        function getJSON(key, fallback = null) {
            try {
                return JSON.parse(localStorage.getItem(key)) ?? fallback;
            } catch {
                return fallback;
            }
        }

        let user = null;
        /* ================= AUTH GUARD ================= */

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/auth/me`, {
                    credentials: "include"
                });

                if (res.status === 401) {
                    redirectToLogin();
                    return;
                }

                if (!res.ok) {
                    redirectToLogin();
                    return;
                }

                user = await res.json();
                renderHeader();
                renderProfile();

            } catch (err) {
                console.error("Auth error:", err);
                redirectToLogin();
            }
        }

        function redirectToLogin() {
            window.location.href = "login.html";
        }

        /* ================= HEADER ================= */

        function renderHeader() {
            const navAuth = document.getElementById("navAuth");

            navAuth.innerHTML = `
                <div class="profile">
                    <button class="avatar-btn" onclick="toggleProfile()">
                        <div class="avatar-letter">
                            ${user.name?.charAt(0) || "U"}
                        </div>
                    </button>

                    <div class="profile-menu" id="profileMenu">
                        <div class="profile-info">
                            <strong>${user.name}</strong>
                            <span>${user.email}</span>
                        </div>
                        <a href="home.html">หน้าหลัก</a>
                        <a href="myprofile.html">บัญชีของฉัน</a>
                        <a href="servicelist.html">ประเภทการบริการ</a>
                        <a href="booking.html">จองบริการ</a>
                        <a href="history.html">ประวัติการจอง</a>
                        <a href="#" class="logout" onclick="logout()">ออกจากระบบ</a>
                    </div>
                </div>
            `;
        }

        /* ================= LOGOUT ================= */
        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    method: "POST",
                    credentials: "include"
                });
            } catch (err) {
                console.log("Logout error:", err);
            }

            redirectToLogin();
        }

        /* =============   SEARCH =============== */
        function toggleSearch() {
            const input = document.getElementById("searchInput");
            input.classList.toggle("show");

            if (input.classList.contains("show")) {
                input.focus();
            } else {
                input.value = "";
                searchHome(); // รีเซ็ตผลลัพธ์
            }
        }

        function searchHome() {
            const keyword = document
                .getElementById("searchInput")
                .value
                .toLowerCase()
                .trim();

            const cards = document.querySelectorAll(".service-item");

            cards.forEach(card => {
                const text = card.innerText.toLowerCase();

                if (keyword === "") {
                    card.style.display = "";
                } else if (text.includes(keyword)) {
                    card.style.display = "";
                } else {
                    card.style.display = "none";
                }
            });
        }

        /* =============  NOTIFICATION SYSTEM =============== */
        const notifySound = new Audio("../sounds/notify.mp3");
        notifySound.volume = 1;

        let audioUnlocked = false;
        let previousUnread = 0;

        // ===== UNLOCK AUDIO =====
        function unlockAudio() {
            if (audioUnlocked) return;

            notifySound.play()
                .then(() => {
                    notifySound.pause();
                    notifySound.currentTime = 0;
                    audioUnlocked = true;
                })
                .catch(() => { });
        }
        document.addEventListener("click", unlockAudio, { once: true });

        // ===== LOAD NOTIFICATIONS =====
        async function loadNotifications() {

            const badge = document.getElementById("notifyCount");
            const list = document.getElementById("notificationList");

            try {
                const res = await fetch(`${API_BASE}/notifications`, {
                    credentials: "include"
                });

                if (!res.ok) return;

                const notifications = await res.json();
                const unread = notifications.filter(n => !n.read);

                badge.textContent = unread.length;
                badge.style.display = unread.length ? "flex" : "none";

                list.innerHTML = "";

                if (!notifications.length) {
                    list.innerHTML =
                        `<li class="empty">ไม่มีการแจ้งเตือน</li>`;
                    return;
                }

                notifications.forEach(n => {

                    const li = document.createElement("li");
                    li.textContent = n.message;
                    if (!n.read) li.classList.add("unread");

                    li.onclick = async () => {

                        await fetch(
                            `${API_BASE}/notifications/${n.id}/read`,
                            {
                                method: "PATCH",
                                credentials: "include"
                            }
                        );

                        loadNotifications();

                        if (n.type === "booking") {
                            window.location.href =
                                `history.html#${n.bookingId}`;
                        }
                    };

                    list.appendChild(li);
                });

            } catch (err) {
                console.log("Notification error:", err);
            }
        }

        // ===== TOGGLE DROPDOWN =====
        function toggleNotification(forceClose = false) {
            const dropdown =
                document.getElementById("notificationDropdown");

            if (!dropdown) return;

            if (forceClose) {
                dropdown.classList.remove("show");
                return;
            }

            dropdown.classList.toggle("show");
        }

        // ===== CLICK OUTSIDE CLOSE =====
        document.addEventListener("click", e => {

            const wrapper =
                document.querySelector(".notification-wrapper");

            const dropdown =
                document.getElementById("notificationDropdown");

            if (!wrapper?.contains(e.target)) {
                dropdown?.classList.remove("show");
            }
        });
        loadNotifications();

        const promoData = JSON.parse(localStorage.getItem("PROMOTIONS") || "[]");
        const grid = document.querySelector(".service-grid");

        /* ================= PROMO ================= */
        async function loadServices() {

            try {
                const res = await fetch(`${API_BASE}/services`);
                const services = await res.json();

                grid.innerHTML = "";

                services.forEach(s => {

                    const isPromo = s.isPromo;

                    let priceHtml = "";

                    if (s.oldPrice) {
                        priceHtml = `
                        <div class="price promo">
                        <span class="price-old">
                            ${s.oldPrice} บาท
                        </span><br>
                        <span class="price-new">
                            ${s.price} บาท
                        </span>
                        </div>`;
                    } else {
                        priceHtml =
                            `<div class="price ${isPromo ? "promo" : ""}">
                            ${s.price} บาท
                            </div>`;
                    }

                    grid.insertAdjacentHTML("beforeend", `
                    <div class="service-item"
                        data-category="${s.category}">

                        <span class="badge
                        ${isPromo ? "promo" : "type"}">
                        ${isPromo ? "PROMO" : s.category}
                        </span>

                        <img src="${s.image || ''}">

                        <div class="service-info">
                        <h3>${s.title}</h3>
                        <p class="service-desc">
                            ${s.desc || ""}
                        </p>

                        ${priceHtml}

                        <a href="booking.html?id=${s.id}"
                            class="btn-book">
                            เลือกบริการ
                        </a>
                        </div>
                    </div>
                    `);
                });

            } catch (err) {
                console.log("Service load error:", err);
            }
        }

        /* ================= ADMIN SERVICE ================= */
        function renderAdminServices() {
            const services = JSON.parse(localStorage.getItem("ALL_SERVICES")) || [];

            services.forEach(s => {
                if (!s.active) return;

                grid.insertAdjacentHTML("beforeend", `
          <div class="service-item" data-category="${s.category}">
            <span class="badge type">${s.category}</span>
            ${s.image
                        ? `<img src="${s.image}">`
                        : `<div style="height:200px;background:#f1f5f9"></div>`
                    }
            <div class="service-info">
              <h3>${s.title}</h3>
              <p class="service-desc">${s.desc || ""}</p>
              <div class="price">${Number(s.price).toLocaleString()} บาท</div>

              <a href="booking.html" class="btn-book"
              onclick='selectService(${JSON.stringify({
                        ...s,
                        isPromo: false,
                        minPrice: s.price,
                        maxPrice: s.price
                    })})'>
                เลือกบริการ
              </a>
            </div>
          </div>
        `);
            });
        }

        /* ================= FILTER ================= */
        function filterService(type, el) {
            document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
            el.classList.add('active');

            document.querySelectorAll('.service-item').forEach(card => {
                card.style.display =
                    type === 'all' || card.dataset.category === type ? '' : 'none';
            });
        }

        // onclick = "window.location.href='booking.html?id=${s.id}'"

        setInterval(async () => {
            if (!user) return;
            await loadNotifications();
        }, 30000);

        /* ================= INIT ================= */
        async function init() {
            await checkAuth();
            if (!user) return;

            await loadNotifications();
            await loadServices();
        }
        init();

    </script>
</body>

</html>
