<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Management | Admin</title>

  <!-- ICON -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">

  <link rel="stylesheet" href="/css/admin/style.css">
  <link rel="stylesheet" href="/css/admin/service_edit.css">
</head>

<body data-page="service_edit">

  <div class="layout">
    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <!-- LOGO -->
      <div class="sidebar-logo">
        <img src="/images/logo.png" alt="Daisenko Logo">
      </div>
      <div class="sidebar-divider"></div>

      <a href="dashboard.html" data-link="dashboard">
        <i class="ri-dashboard-line"></i> แดชบอร์ด
      </a>

      <a href="request.html" data-link="request">
        <i class="ri-user-line"></i> รายการคำขอ
      </a>

      <a href="technicians.html" data-link="technicians">
        <i class="ri-group-line"></i> รายชื่อช่าง
      </a>

      <a href="service_edit.html" data-link="service_edit" class="active">
        <i class="ri-file-list-line"></i> แก้ไขบริการ
      </a>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- ===== TOP NAV ===== -->
      <nav class="top-nav">

        <!-- TOP ROW -->
        <div class="top-row">
          <div class="top-left-group">
            <button class="icon-btn" onclick="toggleSidebar()">
              <i class="ri-menu-line"></i>
            </button>

            <!-- <h1 class="page-title">Service Edit</h1> -->
          </div>

          <div class="top-nav-right">
            <div class="search-wrapper">
              <input type="text" id="searchInput" placeholder="ค้นหา" />
              <button class="icon-btn" onclick="openSearch()">
                <i class="ri-search-line"></i>
              </button>
            </div>

            <div class="notification-wrapper">
              <button class="icon-btn" onclick="toggleNotification()">
                <i class="ri-notification-3-line"></i>
                <span id="notifyCount" class="notify-badge">0</span>
              </button>
              <div id="notificationDropdown" class="notification-dropdown">
                <ul id="notificationList"></ul>
              </div>
            </div>

            <div class="user-wrapper">
              <button class="user-btn" onclick="toggleUserMenu()">
                <span class="user-avatar" id="profileAvatar"></span>

                <span class="user-name" id="profileName"></span>
                <i class="ri-arrow-down-s-line"></i>
              </button>

              <div id="userDropdown" class="user-dropdown">
                <button onclick="logout()">
                  <i class="ri-logout-box-r-line"></i>
                  Logout
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- DIVIDER -->
        <div class="top-divider"></div>
      </nav>

      <div class="content">
        <div class="page-header">
          <h1>Service List</h1>
          <div class="actions">
            <button class="btn btn-add" onclick="openForm()">+ เพิ่มรายการ</button>
            <button class="btn btn-delete" onclick="deleteSelected()">ลบรายการ</button>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>รูป</th>
                <th>ชื่อบริการ</th>
                <th>ประเภท</th>
                <th>รายละเอียด</th>
                <th>ราคา</th>
                <th>สถานะ</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="serviceTable"></tbody>
          </table>
          <div id="serviceMobile"></div>
        </div>
      </div>

      <!-- MODAL -->
      <div class="modal" id="serviceModal">
        <div class="modal-content">
          <h3>แก้ไขบริการ</h3>

          <input type="hidden" id="serviceIndex">

          <div class="form-vertical">

            <!-- Image Upload -->
            <button class="image-btn" onclick="document.getElementById('serviceImage').click()">
              <i class="ri-image-line"></i> เลือกรูปภาพ
            </button>
            <img id="imagePreview" style="display:none;height:80px;border-radius:10px;margin-top:6px">

            <input type="file" id="serviceImage" accept="image/*" hidden>

            <input id="serviceTitle" placeholder="ชื่อบริการ">
            <input id="serviceDesc" placeholder="รายละเอียดบริการ">

            <select id="serviceCategory">
              <option value="" disabled selected></option>
              <option value="standard">Standard</option>
              <option value="general">General</option>
              <option value="premium">Premium</option>
            </select>

            <input type="number" id="servicePrice" placeholder="ราคา (บาท)">

            <div class="active-row">
              <label for="serviceActive">Active</label>
              <label class="switch">
                <input type="checkbox" id="serviceActive" checked>
                <span class="slider"></span>
              </label>
            </div>

          </div>

          <div class="form-actions center">
            <button class="btn btn-add" onclick="saveService()">เพิ่มบริการ</button>
          </div>

        </div>
      </div>

      <!-- DELETE CONFIRM MODAL -->
      <div class="modal" id="deleteConfirmModal">
        <div class="modal-content delete-box">

          <div class="delete-icon">
            <i class="ri-error-warning-line"></i>
          </div>

          <h2>ลบรายการ</h2>
          <p id="deleteMessage">คุ</p>

          <div class="delete-actions">
            <button class="btn cancel-btn" onclick="closeDeleteModal()">ยกเลิก</button>
            <button class="btn delete-btn" onclick="confirmDelete()">ลบ</button>
          </div>

        </div>
      </div>
    </main>
  </div>

  <!-- SEARCH OVERLAY -->
  <div id="searchOverlay" class="search-overlay">
    <div class="search-panel">
      <div class="search-header">
        <i class="ri-search-line"></i>
        <input type="text" id="searchMobileInput" placeholder="ค้นหา..." oninput="searchDashboardMobile()">
        <button onclick="closeSearchOverlay()">✕</button>
      </div>

      <div class="search-body">
        <p class="search-title">การค้นหายอดนิยม</p>
        <div id="searchResults"></div>
      </div>
    </div>
  </div>

  <script src="/js/admin/service_edit.js"></script>

</body>

</html>
